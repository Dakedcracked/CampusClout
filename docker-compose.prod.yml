version: '3.9'

services:
  # PostgreSQL - Primary Database
  postgres:
    image: postgres:14-alpine
    container_name: campusclout-db
    environment:
      POSTGRES_USER: campusclout_prod
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGE_THIS}
      POSTGRES_DB: campusclout_prod
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campusclout_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campusclout-network
    restart: unless-stopped

  # Redis - Cache & Sessions
  redis:
    image: redis:7-alpine
    container_name: campusclout-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-CHANGE_THIS}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campusclout-network
    restart: unless-stopped

  # FastAPI Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: campusclout-api
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://campusclout_prod:${DB_PASSWORD}@postgres:5432/campusclout_prod
      DB_POOL_SIZE: 30
      DB_MAX_OVERFLOW: 10
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # Security
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-CHANGE_THIS_RANDOM_STRING}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      
      # Configuration
      DEBUG: "false"
      ENVIRONMENT: production
      APP_VERSION: 1.0.0
      
      # Email
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: info
      
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    ports:
      - "8000:8000"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - campusclout-network
    
    restart: unless-stopped
    
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: campusclout-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - campusclout-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional, for production)
  nginx:
    image: nginx:alpine
    container_name: campusclout-proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - campusclout-network
    restart: unless-stopped

networks:
  campusclout-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
